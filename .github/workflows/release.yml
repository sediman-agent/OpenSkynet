name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release-tui:
    name: Build & release TUI (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: aarch64-macos
          - target: x86_64-apple-darwin
            runner: macos-13
            platform: x86_64-macos
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: x86_64-linux
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release -p sediman-tui --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist/bin
          cp target/${{ matrix.target }}/release/sediman-tui dist/bin/terminator
          cd dist && tar czf sediman-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz bin/
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sediman-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz
          generate_release_notes: true

  release-electron:
    name: Build & release Electron app
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Build Electron app
        run: |
          cd packages/app
          bun run build
      - name: Package Electron app
        run: |
          cd packages/app
          bun run make --platform=${{ matrix.platform }}
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/app/out/**/*.dmg
          files: packages/app/out/**/*.AppImage
          generate_release_notes: true

  publish-docker:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
